name: draw-check

on:
  # Scheduling is driven by cron-job.org hitting the workflow_dispatch endpoint;
  # GH's own schedule is removed to avoid duplicate runs (and its 5-15min delay).
  workflow_dispatch:
  push:
    branches: [master]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

      - name: Notify Telegram
        if: github.event_name != 'push'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ssq-checker --telegram
      - name: Sync profit/loss history
        if: github.event_name != 'push'
        run: ssq-checker --sync-history
      - name: Commit updated history
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data
          if ! git diff --cached --quiet -- docs/data; then
            git commit -m "chore: update lottery history [skip ci]"
            git push
          else
            echo "No history changes."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
