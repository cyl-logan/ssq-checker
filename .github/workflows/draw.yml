name: draw-check

on:
  schedule:
    # 周日/二/四 22:05 北京时间 = 14:05 UTC（开奖 21:15，留 50 分钟缓冲 + GH 调度延迟）
    - cron: "5 14 * * 0,2,4"
  workflow_dispatch:
  push:
    branches: [main]

# contents:write 用于把新一期历史 commit 回仓库；pages/id-token 用于部署
permissions:
  contents: write
  pages: write
  id-token: write

# 避免并发部署互相打断
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

      # 开奖日：播报 + 把新一期记进历史并提交回仓库（过去的记录冻结不变）
      - name: Notify Telegram
        if: github.event_name != 'push'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: ssq-checker --telegram
      - name: Sync profit/loss history
        if: github.event_name != 'push'
        run: ssq-checker --sync-history
      - name: Commit updated history
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage first so untracked new month files are included in the diff check.
          git add docs/data
          if ! git diff --cached --quiet -- docs/data; then
            git commit -m "chore: update lottery history [skip ci]"
            git push
          else
            echo "No history changes."
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
